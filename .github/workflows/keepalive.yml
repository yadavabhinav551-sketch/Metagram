name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Metagram
        run: |
          curl --fail --silent --show-error --max-time 30 https://metagram-wfbe.onrender.com/healthz
