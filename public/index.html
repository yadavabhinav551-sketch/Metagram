<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#125c4a">
    <meta name="background-color" content="#f4f6f8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Metagram">
    <title>Business Chat</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preload" href="/styles.css" as="style">
    <link rel="stylesheet" href="/styles.css">
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section id="authView" class="auth-view">
        <div class="brand-block">
          <img src="/icon.svg" alt="" class="brand-icon">
          <h1>Business Chat</h1>
          <p>Secure internal messaging for teams.</p>
        </div>
        <div class="auth-card">
          <div class="segmented">
            <button id="loginTab" class="active" type="button">Login</button>
            <button id="signupTab" type="button">Sign up</button>
          </div>
          <form id="loginForm" class="stack">
            <input name="login" autocomplete="username" placeholder="User ID or Mobile Number" required>
            <input name="password" autocomplete="current-password" type="password" placeholder="Password" required>
            <button class="primary" type="submit">Login</button>
          </form>
          <form id="signupForm" class="stack hidden">
            <input name="displayName" autocomplete="name" placeholder="Full Name" required>
            <input name="userId" autocomplete="username" placeholder="User ID" required>
            <input name="mobile" autocomplete="tel" placeholder="Mobile Number" required>
            <input name="password" autocomplete="new-password" type="password" placeholder="Password" required>
            <button class="primary" type="submit">Create account</button>
          </form>
          <button class="install-button install-control hidden" type="button">Install App</button>
          <p id="authError" class="error-text"></p>
        </div>
      </section>

      <section id="chatView" class="chat-view hidden">
        <aside class="sidebar">
          <header class="topbar">
            <div>
              <strong id="meName"></strong>
              <span id="meHandle"></span>
            </div>
            <button class="icon-button install-control hidden" type="button" title="Install app">↓</button>
            <button id="logoutBtn" class="icon-button" type="button" title="Logout">⎋</button>
          </header>
          <div class="search-row">
            <input id="searchInput" placeholder="Search User ID or Mobile">
          </div>
          <div id="searchResults" class="search-results"></div>
          <div id="conversationList" class="conversation-list"></div>
        </aside>

        <section class="chat-panel">
          <header class="chat-header">
            <button id="backBtn" class="icon-button mobile-only" type="button" title="Back">‹</button>
            <div class="avatar" id="chatAvatar">B</div>
            <div>
              <strong id="chatTitle">Select a chat</strong>
              <span id="chatStatus">Search a registered user to begin.</span>
            </div>
            <div class="chat-actions">
              <button id="hideChatBtn" class="text-button hidden" type="button">Hide</button>
              <button id="selectMessagesBtn" class="text-button" type="button">Select</button>
              <button id="clearChatBtn" class="text-button danger" type="button">Clear</button>
            </div>
          </header>
          <div id="messages" class="messages empty-state">No conversation selected.</div>
          <div id="bulkActions" class="bulk-actions hidden">
            <span id="selectedCount">0 selected</span>
            <button id="bulkDeleteBtn" class="text-button danger" type="button">Delete selected</button>
            <button id="cancelSelectBtn" class="text-button" type="button">Cancel</button>
          </div>
          <div id="typingLine" class="typing-line"></div>
          <form id="messageForm" class="composer">
            <input id="fileInput" type="file" class="hidden" accept="image/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">
            <button id="attachBtn" class="icon-button" type="button" title="Attach file">＋</button>
            <button id="voiceBtn" class="icon-button" type="button" title="Record voice">◉</button>
            <input id="messageInput" placeholder="Message" autocomplete="off">
            <button class="send-button" type="submit" title="Send">➤</button>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
