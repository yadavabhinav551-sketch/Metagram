<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#17201d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Metagram Admin">
    <title>Secure Admin</title>
    <link rel="manifest" href="/admin-manifest.json">
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preload" href="/styles.css?v=pro-features-44" as="style">
    <link rel="stylesheet" href="/styles.css?v=pro-features-44">
    <link rel="stylesheet" href="/admin.css?v=pro-features-44">
    <script src="/socket.io/socket.io.js" defer></script>
    <script src="/admin.js?v=pro-features-44" defer></script>
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section id="adminLogin" class="auth-view">
        <div class="auth-card">
          <div class="brand-block compact">
            <h1>Admin Access</h1>
            <p>Restricted monitoring console.</p>
          </div>
          <form id="adminLoginForm" class="stack">
            <input name="loginId" placeholder="Admin Login ID" autocomplete="username" required>
            <input name="password" placeholder="Admin Password" type="password" autocomplete="current-password" required>
            <button class="primary" type="submit">Login</button>
          </form>
          <button class="admin-install-button install-control" type="button">Install Admin App</button>
          <p id="adminError" class="error-text"></p>
        </div>
      </section>

      <section id="adminApp" class="admin-app hidden">
        <header class="admin-header">
          <div>
            <strong>Business Chat Admin</strong>
            <span>Total visibility console</span>
          </div>
          <div class="admin-header-actions">
            <button class="export-link install-control" type="button">Install App</button>
            <a class="export-link" href="/api/admin/export" id="exportLink">Export data</a>
            <a class="export-link" href="/api/admin/backup" id="backupLink">JSON backup</a>
            <button class="export-link danger" id="adminLogoutBtn" type="button">Logout</button>
          </div>
        </header>
        <section class="admin-grid">
          <aside class="admin-panel users-panel">
            <h2>Users</h2>
            <div id="adminStats" class="admin-stats"></div>
            <div id="adminUsers"></div>
          </aside>
          <section class="admin-panel transcript">
            <div class="transcript-head">
              <h2 id="transcriptTitle">Transcript</h2>
              <button id="clearTranscriptBtn" class="danger-action" type="button" disabled>Clear chat</button>
            </div>
            <div id="adminMessages" class="admin-messages">Select a chat.</div>
          </section>
          <aside class="admin-panel chats-panel">
            <h2>Chats</h2>
            <div id="adminConversations"></div>
          </aside>
          <aside class="admin-panel settings-panel">
            <h2>Admin Settings</h2>
            <label class="setting-toggle">
              <input id="secretCodeLoginToggle" type="checkbox">
              <span>
                <strong>Secret code login</strong>
                <small>Allow User ID + hidden secret code login</small>
              </span>
            </label>
            <div class="update-notify-box">
              <label class="setting-toggle">
                <input id="updateNotifyToggle" type="checkbox">
                <span>
                  <strong>Update notify</strong>
                  <small>Force installed user apps to update before chat opens</small>
                </span>
              </label>
              <input id="updateNotifyMessage" maxlength="180" placeholder="Update message for users">
              <div class="update-notify-actions">
                <button id="sendUpdateNotifyBtn" class="primary" type="button">Send update notify</button>
                <button id="saveUpdateNotifyBtn" type="button">Save</button>
              </div>
              <small id="updateNotifyStatus" class="settings-note"></small>
            </div>
            <p id="settingsMessage" class="settings-message"></p>
            <div class="restore-box">
              <h2>Restore</h2>
              <input id="restoreInput" type="file" accept="application/json,.json">
              <button id="restoreBtn" class="danger-action" type="button">Restore backup</button>
            </div>
            <form id="credentialsForm" class="stack">
              <input name="loginId" placeholder="New Admin Login ID" required>
              <input name="password" placeholder="New Admin Password" type="password" required>
              <button class="primary" type="submit">Update credentials</button>
            </form>
            <h2>Groups</h2>
            <form id="groupForm" class="stack">
              <input name="name" placeholder="Group or department name" required>
              <select name="members" id="groupMembers" multiple></select>
              <button class="primary" type="submit">Create group</button>
            </form>
          </aside>
        </section>
      </section>
    </main>
  </body>
</html>
