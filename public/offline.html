<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#125c4a">
    <title>Calculator Offline</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .offline-box {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 22px;
        text-align: center;
        box-shadow: 0 18px 48px rgba(23, 32, 29, 0.12);
      }

      .offline-box img {
        width: 76px;
        height: 76px;
      }

      .offline-box p {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <section class="offline-box">
      <img src="/icons/icon-192.png" alt="">
      <h1>You are offline</h1>
      <p>Calculator needs internet to sync settings, but the app shell is ready. Reconnect and try again.</p>
      <button class="primary" type="button" onclick="location.reload()">Retry</button>
    </section>
  </body>
</html>
